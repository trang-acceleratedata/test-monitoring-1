source_name: salesforce
connector: rest_api_generic
connector_version: 1.0.0
environment: prod
secrets: {}
pipeline_name: salesforce_dlt_pipeline
table_prefix: salesforce_
sync_freq: Daily
target:
  destination_type: sqlite
  database_path: /home/trangtnt/vd-studio/data/sales.db
  schema_name: main
default_sync:
  primary_key: Id
  schema_contract:
    tables: evolve
    columns: evolve
    data_type: discard_value
  metadata_columns:
    _vd_extracted_at: true
    _dlt_load_id: true
    _dlt_id: true
  rate_limit:
    requests_per_second: 10
resources:
  - name: User
    enabled: true
    sync:
      write_disposition: merge
      sync_mode: incremental
  - name: UserRole
    enabled: true
